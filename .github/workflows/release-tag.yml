name: Release Tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build And Publish Release
    runs-on: macos-latest

    steps:
      - name: Ensure Tag Context
        run: |
          if [ "${{ github.ref_type }}" != "tag" ]; then
            echo "This workflow must run on a tag ref (v*)."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure Tag Commit Is On Main
        run: |
          git fetch origin main
          if ! git branch -r --contains "${{ github.sha }}" | grep -q "origin/main"; then
            echo "Tag commit is not on origin/main: ${{ github.sha }}"
            exit 1
          fi

      - name: Build Release App
        run: |
          xcodebuild \
            -project RouteFlow.xcodeproj \
            -scheme RouteFlow \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath .derived/release-build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Create Release Zip
        run: |
          APP_PATH=".derived/release-build/Build/Products/Release/RouteFlow.app"
          ZIP_NAME="RouteFlow-${{ github.ref_name }}.app.zip"

          if [ ! -d "$APP_PATH" ]; then
            echo "RouteFlow.app not found at $APP_PATH"
            exit 1
          fi

          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_NAME"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 7

      - name: Create Or Update Draft Release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          files: ${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

