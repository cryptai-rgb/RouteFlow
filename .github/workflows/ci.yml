name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Static Analysis)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Run Static Analysis
        run: |
          xcodebuild \
            -project RouteFlow.xcodeproj \
            -scheme RouteFlow \
            -destination 'platform=macOS' \
            -derivedDataPath .derived/ci-analyze \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            analyze

  build:
    name: Build Check
    runs-on: macos-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild \
            -project RouteFlow.xcodeproj \
            -scheme RouteFlow \
            -destination 'platform=macOS' \
            -derivedDataPath .derived/ci-build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Test
        run: |
          xcodebuild \
            -project RouteFlow.xcodeproj \
            -scheme RouteFlow \
            -destination 'platform=macOS' \
            -derivedDataPath .derived/ci-test \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            test
